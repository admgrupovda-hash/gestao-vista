<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão à Vista — Gelocrim</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4;
    --warm-white: #F5F2EC;
    --stone: #E8E2D8;
    --taupe: #C4B9A8;
    --warm-gray: #8C8378;
    --dark: #2C2825;
    --charcoal: #4A4540;
    --gold: #C9A96E;
    --geo: #7A2E22;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100vh;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--dark);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .tv-header {
    background: var(--dark);
    padding: 14px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .header-left { display: flex; align-items: center; gap: 24px; }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 24px;
    color: var(--cream); line-height: 1;
  }
  .logo em { font-style: italic; color: var(--gold); }
  .logo small {
    display: block; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--taupe); margin-top: 3px;
    font-family: 'DM Sans', sans-serif; font-weight: 400;
  }
  .area-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 32px;
    color: var(--cream);
    border-left: 2px solid var(--gold);
    padding-left: 24px;
    line-height: 1;
    transition: opacity 0.3s;
  }
  .area-name em { font-style: italic; color: var(--gold); }
  .header-right { text-align: right; }
  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 26px; color: var(--cream); line-height: 1;
  }
  .date-lbl {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--taupe);
    margin-top: 4px;
  }
  .nav-dots {
    display: flex; gap: 6px; align-items: center;
    margin-top: 8px; justify-content: flex-end;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.4s, transform 0.3s;
    cursor: pointer;
  }
  .dot.active { background: var(--gold); transform: scale(1.3); }

  /* KPI STRIP */
  .kpi-strip {
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 10px 48px;
    display: flex; gap: 0; align-items: center;
    flex-shrink: 0;
  }
  .kpi-item {
    display: flex; flex-direction: column;
    align-items: center; min-width: 72px; padding: 0 16px;
  }
  .kpi-item:first-child { padding-left: 0; }
  .kpi-val {
    font-family: 'DM Mono', monospace;
    font-size: 26px; font-weight: 500;
    color: var(--cream); line-height: 1;
  }
  .kpi-lbl {
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--taupe);
    margin-top: 3px;
  }
  .kpi-sep { width: 1px; height: 36px; background: rgba(255,255,255,0.08); }
  .area-nav {
    display: flex; gap: 6px; align-items: center;
    margin-left: auto; padding-left: 24px;
  }
  .nav-btn {
    padding: 5px 14px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent; border-radius: 2px;
    cursor: pointer; color: rgba(255,255,255,0.4);
    font-family: 'DM Sans', sans-serif; font-weight: 400;
    transition: all 0.2s;
  }
  .nav-btn.active {
    background: var(--geo); color: #fff; border-color: var(--geo);
  }
  .nav-btn:hover:not(.active) {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.75);
  }

  /* KANBAN */
  .main-area {
    flex: 1; padding: 16px 48px 12px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .kanban-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px; flex: 1; overflow: hidden;
    transition: opacity 0.35s;
  }
  .kanban-grid.hidden { opacity: 0; }
  .col-wrap { display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
  .col-header {
    padding: 9px 14px; border-radius: 2px;
    display: flex; justify-content: space-between;
    align-items: center; flex-shrink: 0;
  }
  .col-title {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 500;
  }
  .col-count {
    font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 1px 8px; border-radius: 10px;
    background: rgba(0,0,0,0.15);
  }
  .cards-scroll {
    overflow-y: auto; display: flex;
    flex-direction: column; gap: 7px; flex: 1;
  }
  .cards-scroll::-webkit-scrollbar { width: 2px; }
  .cards-scroll::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08); border-radius: 2px;
  }
  .task-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 2px; padding: 10px 13px;
    border-left: 3px solid transparent;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .task-card:hover { background: rgba(255,255,255,0.09); }
  .task-name {
    font-size: 12.5px; line-height: 1.45;
    color: rgba(255,255,255,0.88); font-weight: 400;
    margin-bottom: 6px;
  }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .task-list {
    font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 2px 7px;
    border-radius: 2px; font-weight: 500;
  }
  .task-due { font-size: 10px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.4); }
  .task-due.overdue { color: #E07070; font-weight: 500; }
  .task-due.soon { color: #D4A85A; }
  .task-resp { font-size: 10px; color: rgba(255,255,255,0.35); margin-left: auto; }
  .prio-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .empty-col {
    color: rgba(255,255,255,0.18); font-size: 11px;
    text-align: center; padding: 24px 8px;
    letter-spacing: 1px; text-transform: uppercase;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 16px;
  }
  .more-tag {
    color: rgba(255,255,255,0.25); font-size: 10px;
    text-align: center; padding: 6px; letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* FOOTER */
  .progress-footer {
    background: rgba(0,0,0,0.25);
    padding: 7px 48px;
    display: flex; justify-content: space-between;
    align-items: center; flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .footer-left { display: flex; align-items: center; gap: 16px; }
  .prog-txt {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--taupe);
  }
  .sync-txt {
    font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.2);
  }
  .prog-track {
    width: 180px; height: 3px;
    background: rgba(255,255,255,0.08); border-radius: 2px;
  }
  .prog-fill {
    height: 100%; background: var(--gold);
    border-radius: 2px; transition: width 1s linear;
  }

  /* LOADING */
  .loading {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: center;
  }
  .loading p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 22px;
    color: rgba(255,255,255,0.25);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>

<!-- HEADER -->
<div class="tv-header">
  <div class="header-left">
    <div>
      <div class="logo">Gelo<em>crim</em><small>Gestão à Vista</small></div>
    </div>
    <div class="area-name" id="area-title">Carregando<em>...</em></div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-lbl" id="date-lbl">--/--/----</div>
    <div class="nav-dots" id="nav-dots"></div>
  </div>
</div>

<!-- KPI STRIP -->
<div class="kpi-strip">
  <div class="kpi-item">
    <span class="kpi-val" id="k-total">--</span>
    <span class="kpi-lbl">Total</span>
  </div>
  <div class="kpi-sep"></div>
  <div class="kpi-item">
    <span class="kpi-val" id="k-open" style="color:#6DBF8A">--</span>
    <span class="kpi-lbl">Aberto</span>
  </div>
  <div class="kpi-sep"></div>
  <div class="kpi-item">
    <span class="kpi-val" id="k-prog" style="color:#7AABDA">--</span>
    <span class="kpi-lbl">Andamento</span>
  </div>
  <div class="kpi-sep"></div>
  <div class="kpi-item">
    <span class="kpi-val" id="k-pend" style="color:#D4A85A">--</span>
    <span class="kpi-lbl">Pendente</span>
  </div>
  <div class="kpi-sep"></div>
  <div class="kpi-item">
    <span class="kpi-val" id="k-done" style="color:#C4B9A8">--</span>
    <span class="kpi-lbl">Concluído</span>
  </div>
  <div class="kpi-sep"></div>
  <div class="kpi-item">
    <span class="kpi-val" id="k-urg" style="color:#E07070">--</span>
    <span class="kpi-lbl">Urgente</span>
  </div>
  <div class="area-nav" id="area-nav"></div>
</div>

<!-- KANBAN -->
<div class="main-area">
  <div class="kanban-grid" id="kanban-grid">
    <div class="loading"><p>Conectando ao ClickUp...</p></div>
  </div>
</div>

<!-- FOOTER -->
<div class="progress-footer">
  <div class="footer-left">
    <p class="prog-txt" id="prog-txt">Próxima área em --s</p>
    <p class="sync-txt" id="sync-txt">Última sincronização: --</p>
  </div>
  <div class="prog-track">
    <div class="prog-fill" id="prog-fill" style="width:100%"></div>
  </div>
</div>

<script>
const API_KEY = 'pk_55088054_FBETED60BBWCG7ASQSIXLN4CUYGBH9D5';
const SPACE_ID = '90070078578';
const ROTATE_SEC = 60;
const SYNC_SEC = 300; // rebusca dados a cada 5 min

const AREAS = [
  {
    key: 'comercial',
    label: 'Comercial',
    color: '#C9A96E',
    lists: ['Comercial','Gestão Comercial','CRM — Carteira Ativa','1. CRM & Conversão de Leads']
  },
  {
    key: 'industrial',
    label: 'Industrial & Produção',
    color: '#7BBF96',
    lists: ['Industrial','Estoque Materia Prima','Estoque de Matéria-Prima','SGQ']
  },
  {
    key: 'manutencao',
    label: 'Manutenção',
    color: '#7AABDA',
    lists: ['Manutenção Equipamentos','Manutenção frota','Cadastro Equipamento']
  },
  {
    key: 'projetos',
    label: 'Projetos & Plano de Ação',
    color: '#9A8ED4',
    lists: [
      '2. Redução de Trocas & Avarias',
      'Redução de Trocas & Avarias',
      '3. Piloto B2C Moto - Ponta Negra',
      'Piloto B2C Moto — Ponta Negra',
      '4. Trade Marketing & Ativação PDV',
      'Trade Marketing & Ativação PDV',
      '5. Piloto Roteirização - Diluição Custo Logístico',
      'Piloto Roteirização — Diluição de Custo Logístico'
    ]
  },
  {
    key: 'geral',
    label: 'Operacional Geral',
    color: '#D4826E',
    lists: ['Geral Gelocrim','List']
  }
];

const STATUS_CFG = {
  'aberto':       { label:'Aberto',       bg:'rgba(109,191,138,0.11)', col:'#6DBF8A', border:'#6DBF8A' },
  'em andamento': { label:'Em Andamento', bg:'rgba(122,171,218,0.11)', col:'#7AABDA', border:'#7AABDA' },
  'pendente':     { label:'Pendente',     bg:'rgba(212,168,90,0.11)',  col:'#D4A85A', border:'#D4A85A' },
  'completo':     { label:'Concluído',    bg:'rgba(196,185,168,0.08)', col:'#C4B9A8', border:'#8C8378' }
};
const STATUS_KEYS = ['aberto','em andamento','pendente','completo'];
const PRIO_COLOR = { urgent:'#E07070', high:'#D4A85A', normal:'#7AABDA', low:'#8C8378' };

let allTasks = [];
let currentArea = 0;
let rotTimer, cdTimer, syncTimer;
let countdown = ROTATE_SEC;

function norm(s) { return (s || '').toLowerCase().trim(); }

function fmtDue(ts) {
  if (!ts) return null;
  const d = new Date(parseInt(ts));
  const diff = Math.floor((d - Date.now()) / 86400000);
  const str = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
  if (diff < 0) return { str, cls:'overdue' };
  if (diff <= 3) return { str, cls:'soon' };
  return { str, cls:'' };
}

function fmtTime(d) {
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

async function fetchTasks() {
  const p = new URLSearchParams();
  p.append('space_ids[]', SPACE_ID);
  p.append('include_closed', 'false');
  p.append('subtasks', 'false');
  p.append('page', '0');
  try {
    const r = await fetch(`https://api.clickup.com/api/v2/task?${p}`, {
      headers: { 'Authorization': API_KEY }
    });
    const d = await r.json();
    document.getElementById('sync-txt').textContent = 'Última sincronização: ' + fmtTime(new Date());
    return d.tasks || [];
  } catch(e) {
    document.getElementById('sync-txt').textContent = 'Erro de conexão — tentando novamente...';
    return allTasks;
  }
}

function getAreaTasks(area) {
  return allTasks.filter(t => area.lists.includes(t.list?.name));
}

function renderKPIs(tasks) {
  document.getElementById('k-total').textContent = tasks.length;
  document.getElementById('k-open').textContent = tasks.filter(t => ['aberto','open'].includes(norm(t.status))).length;
  document.getElementById('k-prog').textContent = tasks.filter(t => ['em andamento','in progress'].includes(norm(t.status))).length;
  document.getElementById('k-pend').textContent = tasks.filter(t => norm(t.status) === 'pendente').length;
  document.getElementById('k-done').textContent = tasks.filter(t => ['completo','done'].includes(norm(t.status))).length;
  document.getElementById('k-urg').textContent = tasks.filter(t => t.priority?.priority === 'urgent').length;
}

function buildNav() {
  // dots
  document.getElementById('nav-dots').innerHTML = AREAS.map((_,i) =>
    `<span class="dot${i===currentArea?' active':''}" onclick="jumpArea(${i})"></span>`
  ).join('');
  // btns
  document.getElementById('area-nav').innerHTML = AREAS.map((a,i) =>
    `<button class="nav-btn${i===currentArea?' active':''}" onclick="jumpArea(${i})">${a.label}</button>`
  ).join('');
}

function renderArea(idx) {
  const area = AREAS[idx];
  const tasks = getAreaTasks(area);

  // título
  const title = document.getElementById('area-title');
  title.style.opacity = '0';
  setTimeout(() => {
    title.innerHTML = area.label.replace('&', '<em style="color:var(--gold)"> & </em>');
    title.style.opacity = '1';
    title.style.transition = 'opacity 0.35s';
  }, 200);

  renderKPIs(tasks);

  // agrupar por status
  const groups = {};
  STATUS_KEYS.forEach(s => groups[s] = []);
  tasks.forEach(t => {
    const s = norm(t.status);
    if (['aberto','open'].includes(s)) groups['aberto'].push(t);
    else if (['em andamento','in progress'].includes(s)) groups['em andamento'].push(t);
    else if (s === 'pendente') groups['pendente'].push(t);
    else if (['completo','done'].includes(s)) groups['completo'].push(t);
    else groups['aberto'].push(t);
  });

  const grid = document.getElementById('kanban-grid');
  grid.classList.add('hidden');

  setTimeout(() => {
    grid.innerHTML = '';
    STATUS_KEYS.forEach(status => {
      const cfg = STATUS_CFG[status];
      const col = document.createElement('div');
      col.className = 'col-wrap';

      // header
      const hdr = document.createElement('div');
      hdr.className = 'col-header';
      hdr.style.cssText = `background:${cfg.bg}; border-left:3px solid ${cfg.border};`;
      hdr.innerHTML = `<span class="col-title" style="color:${cfg.col}">${cfg.label}</span>
                       <span class="col-count" style="color:${cfg.col}">${groups[status].length}</span>`;
      col.appendChild(hdr);

      // cards
      const scroll = document.createElement('div');
      scroll.className = 'cards-scroll';

      if (groups[status].length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-col';
        empty.textContent = 'nenhuma tarefa';
        scroll.appendChild(empty);
      } else {
        const MAX = 15;
        groups[status].slice(0, MAX).forEach(task => {
          const card = document.createElement('div');
          card.className = 'task-card';
          card.style.borderLeftColor = area.color;

          const due = task.due_date ? fmtDue(task.due_date) : null;
          const prio = task.priority?.priority;
          const ac = task.assignees?.filter(a => a.username).length || 0;
          const listName = task.list?.name || '';
          const shortList = listName.length > 24 ? listName.slice(0,24)+'…' : listName;
          const name = task.name.replace(/[\u{1F300}-\u{1FAD6}]/gu, '').trim();

          card.innerHTML = `
            <div class="task-name">${name}</div>
            <div class="task-meta">
              <span class="task-list" style="background:${area.color}22;color:${area.color}">${shortList}</span>
              ${prio ? `<span class="prio-dot" style="background:${PRIO_COLOR[prio]}" title="${prio}"></span>` : ''}
              ${due ? `<span class="task-due ${due.cls}">${due.str}</span>` : ''}
              ${ac > 0 ? `<span class="task-resp">${ac} resp.</span>` : ''}
            </div>`;
          scroll.appendChild(card);
        });
        if (groups[status].length > MAX) {
          const more = document.createElement('div');
          more.className = 'more-tag';
          more.textContent = `+ ${groups[status].length - MAX} mais`;
          scroll.appendChild(more);
        }
      }
      col.appendChild(scroll);
      grid.appendChild(col);
    });

    grid.classList.remove('hidden');
  }, 300);

  // sync nav
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function startCountdown() {
  clearInterval(cdTimer);
  countdown = ROTATE_SEC;
  const fill = document.getElementById('prog-fill');
  const txt = document.getElementById('prog-txt');
  fill.style.width = '100%';

  cdTimer = setInterval(() => {
    countdown--;
    fill.style.width = Math.round(countdown / ROTATE_SEC * 100) + '%';
    txt.textContent = `Próxima área em ${countdown}s`;
    if (countdown <= 0) {
      clearInterval(cdTimer);
      currentArea = (currentArea + 1) % AREAS.length;
      renderArea(currentArea);
      startCountdown();
    }
  }, 1000);
}

function jumpArea(idx) {
  currentArea = idx;
  renderArea(currentArea);
  startCountdown();
}

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('pt-BR');
  document.getElementById('date-lbl').textContent = n.toLocaleDateString('pt-BR', {
    weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'
  });
}

async function syncData() {
  allTasks = await fetchTasks();
  renderArea(currentArea);
}

async function init() {
  buildNav();
  allTasks = await fetchTasks();
  renderArea(currentArea);
  startCountdown();
  // rebusca dados a cada 5 minutos
  syncTimer = setInterval(syncData, SYNC_SEC * 1000);
}

setInterval(updateClock, 1000);
updateClock();
init();
</script>
</body>
</html>
