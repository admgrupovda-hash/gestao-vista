<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão à Vista — Gelocrim</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --geo-blue:#0A1628;
  --geo-blue-mid:#0D2040;
  --geo-blue-light:#1A3A6B;
  --geo-accent:#2B6CB0;
  --geo-bright:#4A9EE8;
  --geo-ice:#A8D4F5;
  --white:#FFFFFF;
  --white70:rgba(255,255,255,0.7);
  --white40:rgba(255,255,255,0.4);
  --white15:rgba(255,255,255,0.15);
  --white08:rgba(255,255,255,0.08);
  --red:#E05252;
  --red-bg:rgba(224,82,82,0.15);
  --green:#4CAF7D;
  --green-bg:rgba(76,175,125,0.15);
  --amber:#E6A817;
  --amber-bg:rgba(230,168,23,0.15);
  --purple:#8B7DD4;
  --taupe:rgba(168,212,245,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;background:var(--geo-blue);font-family:'Montserrat',sans-serif;overflow:hidden;display:flex;flex-direction:column;}
.tv-header{background:var(--geo-blue-mid);border-bottom:2px solid var(--geo-accent)!important;padding:11px 36px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);}
.header-left{display:flex;align-items:center;gap:18px;}
.logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;color:var(--white);line-height:1;letter-spacing:2px;text-transform:uppercase;}
.logo em{font-style:normal;color:var(--geo-bright);}
.logo small{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--geo-ice);margin-top:3px;font-weight:500;}
.area-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:26px;color:var(--white);border-left:3px solid var(--geo-bright);padding-left:18px;line-height:1;transition:opacity 0.3s;letter-spacing:0.5px;}
.area-name em{font-style:normal;color:var(--geo-bright);}
.header-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.clock{font-family:'DM Mono',monospace;font-size:24px;color:var(--white);line-height:1;font-weight:500;}
.date-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--geo-ice);}
.nav-dots{display:flex;gap:5px;align-items:center;justify-content:flex-end;margin-top:3px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--white15);transition:all 0.3s;cursor:pointer;}
.dot.active{background:var(--geo-bright);transform:scale(1.3);}
.kpi-strip{background:var(--geo-blue-mid);border-bottom:1px solid var(--geo-light,rgba(42,107,176,0.4));padding:7px 36px;display:flex;gap:0;align-items:center;flex-shrink:0;}
.kpi-item{display:flex;flex-direction:column;align-items:center;min-width:66px;padding:0 10px;}
.kpi-item:first-child{padding-left:0;}
.kpi-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:600;color:var(--white);line-height:1;}
.kpi-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--geo-ice);margin-top:2px;font-weight:600;}
.kpi-sep{width:1px;height:32px;background:var(--white08);}
.area-nav{display:flex;gap:4px;align-items:center;margin-left:auto;padding-left:12px;flex-wrap:wrap;}
.nav-btn{padding:4px 10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--geo-accent);background:transparent;border-radius:3px;cursor:pointer;color:var(--geo-ice);font-family:'Montserrat',sans-serif;font-weight:600;transition:all 0.2s;white-space:nowrap;}
.nav-btn.active{background:var(--geo-accent);color:var(--white);border-color:var(--geo-bright);box-shadow:0 0 12px rgba(74,158,232,0.3);}
.nav-btn:hover:not(.active){background:var(--white08);color:var(--white);}
.nav-btn.chart-btn.active{background:rgba(74,158,232,0.2);border-color:var(--geo-bright);color:var(--geo-bright);}
.main-area{flex:1;padding:11px 36px 9px;overflow:hidden;display:flex;flex-direction:column;min-height:0;background:var(--geo-blue);}
.kanban-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;flex:1;overflow:hidden;transition:opacity 0.3s;min-height:0;}
.kanban-grid.hidden{opacity:0;}
.col-wrap{display:flex;flex-direction:column;gap:6px;overflow:hidden;min-height:0;}
.col-header{padding:8px 11px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.col-hl{display:flex;align-items:center;gap:5px;}
.col-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;font-family:'Montserrat',sans-serif;}
.col-count{font-family:'DM Mono',monospace;font-size:12px;padding:1px 7px;border-radius:10px;background:rgba(0,0,0,0.15);}
.ticker-outer{flex:1;overflow:hidden;position:relative;min-height:0;}
.ticker-inner{display:flex;flex-direction:column;gap:6px;will-change:transform;}
.task-card{background:var(--geo-blue-light);border:1px solid rgba(74,158,232,0.2);border-radius:4px;padding:9px 11px;border-left:3px solid transparent;flex-shrink:0;}
.task-name{font-size:12px;line-height:1.4;color:var(--white);font-weight:500;margin-bottom:5px;}
.task-meta{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.stag{font-size:9px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:2px 5px;border-radius:2px;flex-shrink:0;}
.ltag{font-size:9px;letter-spacing:.8px;text-transform:uppercase;padding:2px 5px;border-radius:2px;font-weight:500;}
.task-due{font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.4);}
.task-due.overdue{color:#E07070;font-weight:500;}
.task-due.today-cls{color:#D4A85A;font-weight:500;}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.resp{font-size:10px;color:var(--geo-ice);margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px;}
.no-resp{font-size:9px;color:#E07070;background:rgba(224,112,112,0.15);padding:1px 5px;border-radius:2px;margin-left:auto;}
.empty-col{color:var(--white15);text-align:center;padding:18px 6px;font-family:'Montserrat',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;}
.chart-view{flex:1;display:none;align-items:center;justify-content:center;gap:44px;padding:10px 36px;background:var(--geo-blue);}
.chart-view.active{display:flex;}
.chart-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:18px;color:var(--white);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
.chart-title em{font-style:normal;color:var(--geo-bright);}
.chart-canvas-wrap{position:relative;}
.chart-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.ccnum{font-family:'DM Mono',monospace;font-size:28px;font-weight:600;color:var(--white);line-height:1;}
.cclbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--geo-ice);margin-top:2px;}
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;}
.leg-item{display:flex;align-items:center;gap:6px;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-lbl{font-size:11px;color:var(--white70);flex:1;font-weight:500;}
.leg-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--white);font-weight:600;}
.progress-footer{background:var(--geo-blue-mid);padding:5px 36px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-top:1px solid var(--geo-accent);}
.prog-txt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--geo-ice);font-weight:600;}
.sync-txt{font-size:10px;color:var(--white40);}
.prog-track{width:160px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;}
.prog-fill{height:100%;background:var(--geo-bright);border-radius:2px;transition:width 1s linear;box-shadow:0 0 6px rgba(74,158,232,0.5);}
</style>
</head>

function norm(s){return(s||'').toLowerCase().trim();}
function today(){return new Date(new Date().toDateString());}

function classify(t){
  const done=['completo','done','concluido'];
  const s=norm(t.status);
  if(done.includes(s)) return 'concluido';
  // Usar EXCLUSIVAMENTE a flag overdue definida pela API do ClickUp
  if(t.overdue===true) return 'vencidas';
  // Sem prazo ou sem responsável = sem-data
  if(!t.due||!t.assignees||!t.assignees.length) return 'sem-data';
  // Classificar os demais por prazo futuro
  const todayMidnight=new Date(new Date().toDateString());
  const diff=Math.floor((new Date(t.due)-todayMidnight)/86400000);
  if(diff===0) return 'hoje';
  if(diff<=7)  return 'semana';
  return 'futuras';
}

function fmtDue(str){
  if(!str)return null;
  const diff=Math.floor((new Date(str)-today())/86400000);
  const label=new Date(str).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  if(diff<0)   return{str:label,cls:'overdue'};
  if(diff===0) return{str:'Hoje',cls:'today-cls'};
  return{str:label,cls:''};
}

function buildCard(task,areaColor){
  const card=document.createElement('div');
  card.className='task-card';card.style.borderLeftColor=areaColor;
  const s=norm(task.status);
  const sc=SCFG[s]||{label:s,bg:'rgba(255,255,255,0.1)',col:'#C4B9A8'};
  const due=task.due?fmtDue(task.due):null;
  const noResp=!task.assignees||!task.assignees.length;
  const fn=(task.assignees||[])[0]||'';
  const extra=(task.assignees||[]).length>1?` +${task.assignees.length-1}`:'';
  const ls=(task.list||'').length>15?(task.list||'').slice(0,15)+'…':(task.list||'');
  card.innerHTML=`<div class="task-name">${task.name}</div>
    <div class="task-meta">
      <span class="stag" style="background:${sc.bg};color:${sc.col}">${sc.label}</span>
      <span class="ltag" style="background:${areaColor}22;color:${areaColor}">${ls}</span>
      ${task.priority?`<span class="pdot" style="background:${PRIO[task.priority]}"></span>`:''}
      ${due?`<span class="task-due ${due.cls}">${due.str}</span>`:''}
      ${noResp?`<span class="no-resp">Sem resp.</span>`:`<span class="resp">👤 ${fn}${extra}</span>`}
    </div>`;
  return card;
}

function setupTicker(outerEl,cards,areaColor){
  if(!cards.length){
    const e=document.createElement('div');e.className='empty-col';e.textContent='Nenhuma tarefa';
    outerEl.appendChild(e);return;
  }
  const inner=document.createElement('div');inner.className='ticker-inner';
  cards.forEach(t=>inner.appendChild(buildCard(t,areaColor)));
  outerEl.appendChild(inner);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const oH=outerEl.clientHeight,iH=inner.scrollHeight;
    if(iH<=oH)return;
    cards.forEach(t=>inner.appendChild(buildCard(t,areaColor)));
    const dur=(inner.scrollHeight/2)/TICKER_SPEED;
    inner.style.animation=`tickerScroll ${dur}s linear infinite`;
    if(!document.getElementById('kf')){
      const s=document.createElement('style');s.id='kf';
      s.textContent=`@keyframes tickerScroll{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}`;
      document.head.appendChild(s);
    }
  }));
}

function getTaskList(area){
  if(area.isChart) return ALL_TASKS;
  return TASKS[area.key]||[];
}

function groupTasks(tasks){
  const g={};COLS.forEach(c=>g[c.key]=[]);
  tasks.forEach(t=>{const k=classify(t);if(k&&g[k])g[k].push(t);});
  return g;
}

function renderKPIs(tasks){
  const g=groupTasks(tasks);
  document.getElementById('k-venc').textContent=g.vencidas.length;
  document.getElementById('k-hoje').textContent=g.hoje.length;
  document.getElementById('k-sem').textContent=g.semana.length;
  document.getElementById('k-fut').textContent=g.futuras.length;
  document.getElementById('k-sd').textContent=g['sem-data'].length;
  document.getElementById('k-done').textContent=g.concluido.length;
  document.getElementById('k-total').textContent=tasks.length;
  document.getElementById('k-urg').textContent=tasks.filter(t=>t.priority==='urgent').length;
  return g;
}

function drawPizza(){
  const canvas=document.getElementById('pizza-chart');
  const ctx=canvas.getContext('2d');
  const cx=115,cy=115,r=100,rIn=58;
  const data=AREAS.filter(a=>!a.isChart).map(a=>{
    const v=(TASKS[a.key]||[]).filter(t=>classify(t)==='vencidas').length;
    return{label:a.label,color:a.color,value:v};
  }).filter(d=>d.value>0);
  const total=data.reduce((s,d)=>s+d.value,0);
  document.getElementById('chart-total').textContent=total;
  ctx.clearRect(0,0,230,230);
  if(!total){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=42;ctx.stroke();
    return;
  }
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const sl=(d.value/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sl);
    ctx.closePath();ctx.fillStyle=d.color;ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,rIn,0,Math.PI*2);ctx.fillStyle='#2C2825';ctx.fill();
    angle+=sl;
  });
  angle=-Math.PI/2;
  data.forEach(d=>{
    const sl=(d.value/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sl);
    ctx.closePath();ctx.strokeStyle='#2C2825';ctx.lineWidth=2;ctx.stroke();
    angle+=sl;
  });
  const leg=document.getElementById('chart-legend');leg.innerHTML='';
  AREAS.filter(a=>!a.isChart).forEach(a=>{
    const v=data.find(d=>d.label===a.label)?.value||0;
    const pct=total>0?Math.round(v/total*100):0;
    leg.innerHTML+=`<div class="leg-item"><div class="leg-dot" style="background:${a.color}"></div>
      <span class="leg-lbl">${a.label}</span>
      <span class="leg-val">${v}<span style="font-size:9px;color:var(--taupe)"> ${pct}%</span></span></div>`;
  });
  const rm={};
  ALL_TASKS.filter(t=>classify(t)==='vencidas').forEach(t=>{
    (t.assignees||[]).forEach(r=>{rm[r]=(rm[r]||0)+1;});
    if(!t.assignees||!t.assignees.length) rm['Sem resp.']=(rm['Sem resp.']||0)+1;
  });
  const rL=document.getElementById('resp-legend');rL.innerHTML='';
  Object.entries(rm).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([n,v])=>{
    const pct=total>0?Math.round(v/total*100):0;
    rL.innerHTML+=`<div style="display:flex;flex-direction:column;gap:3px;">
      <div style="display:flex;justify-content:space-between;">
        <span style="font-size:11px;color:rgba(255,255,255,0.7)">${n}</span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:#FFFFFF;font-weight:600;font-size:13px">${v}</span>
      </div>
      <div style="height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:var(--geo-bright);border-radius:2px;"></div>
      </div></div>`;
  });
  const allG=groupTasks(ALL_TASKS);
  const sb=document.getElementById('status-bars');sb.innerHTML='';
  [{key:'vencidas',label:'Vencidas',color:'#E07070'},{key:'hoje',label:'Hoje',color:'#D4A85A'},
   {key:'semana',label:'Esta Semana',color:'#7AABDA'},{key:'futuras',label:'Futuras',color:'#9A8ED4'},
   {key:'sem-data',label:'Sem Data/Resp.',color:'#C4B9A8'},{key:'concluido',label:'Concluído',color:'#6DBF8A'}
  ].forEach(b=>{
    const v=allG[b.key]?.length||0;
    const pct=Math.round(v/ALL_TASKS.length*100);
    sb.innerHTML+=`<div style="display:flex;flex-direction:column;gap:3px;">
      <div style="display:flex;justify-content:space-between;">
        <span style="font-size:11px;color:rgba(255,255,255,0.65)">${b.label}</span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--cream)">${v} <span style="font-size:9px;color:var(--taupe)">${pct}%</span></span>
      </div>
      <div style="height:5px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${b.color};border-radius:2px;"></div>
      </div></div>`;
  });
}

        wrap.appendChild(hdr);
        const outer=document.createElement('div');outer.className='ticker-outer';
        setupTicker(outer,groups[col.key],area.color);
        wrap.appendChild(outer);kanban.appendChild(wrap);
      });
      kanban.classList.remove('hidden');
    },300);
  }
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function startCountdown(){
  clearInterval(cdTimer);
  const sec = ROTATE_SEC;
  countdown=sec;
  const fill=document.getElementById('prog-fill'),txt=document.getElementById('prog-txt');
  fill.style.width='100%';
  cdTimer=setInterval(()=>{
    countdown--;
    fill.style.width=Math.round(countdown/sec*100)+'%';
    txt.textContent=`Próxima área em ${countdown}s`;
    if(countdown<=0){clearInterval(cdTimer);currentArea=(currentArea+1)%AREAS.length;renderArea(currentArea);startCountdown();}
  },1000);
}

function jumpArea(idx){currentArea=idx;renderArea(currentArea);startCountdown();}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR');
  document.getElementById('date-lbl').textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
}

async function fetchFromN8N(){
  try{
    const r=await fetch(N8N_WEBHOOK_URL);
    const d=await r.json();
    // N8N retorna {tasks:[...]} ou array direto
    const tasks=d.tasks||d||[];
    const syncEl=document.getElementById('sync-txt');
    if(!tasks.length){
      syncEl.textContent='N8N indisponível — dados de 11/05/2026';
      return;
    }
    // Diagnóstico: mostrar estrutura do primeiro item
    const t0=tasks[0];
    const statusVal=t0.status?.status||t0.status||'?';
    const listVal=t0.list?.name||t0.list||'?';
    const assignVal=JSON.stringify(t0.assignees?.[0]||'?');
    // mapear tarefas reais para o formato do painel
    const mapped=tasks.map(t=>({
      name:t.name,
      status:norm(t.status?.status||t.status||'aberto'),
      priority:t.priority?.priority||null,
      list:t.list?.name||'',
      due:t.due_date?new Date(parseInt(t.due_date)).toISOString().split('T')[0]:null,
      assignees:(t.assignees||[]).map(a=>a.username?.split(' ')[0]||a.username||a.email?.split('@')[0]||''),
      folder:mapFolder(t.list?.name||'')
    }));
    // atualiza TASKS com dados reais
    Object.keys(TASKS).forEach(k=>TASKS[k]=[]);
    mapped.forEach(t=>{
      const f=t.folder||'PROJETOS';
      if(TASKS[f]) TASKS[f].push({...t,folder:f});
    });
    ALL_TASKS.length=0;
    Object.entries(TASKS).forEach(([f,ts])=>ts.forEach(t=>ALL_TASKS.push({...t,folder:f})));
    syncEl.textContent='✓ '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' · '+ALL_TASKS.length+' tarefas · status ex:"'+statusVal+'" · list ex:"'+listVal+'" · assign ex:'+assignVal;
  }catch(e){
    document.getElementById('sync-txt').textContent='Erro: '+e.message;
  }
}

    'Industrial':'PRODUÇÃO',

function shouldSync(){
  // Atualiza apenas seg-sex (1-5), entre 7h e 18h
  const now=new Date();
  const dow=now.getDay(); // 0=dom, 6=sab
  const hour=now.getHours();
  return dow>=1 && dow<=5 && hour>=7 && hour<18;
}

async function manualRefresh(){
  const btn=document.getElementById('refresh-btn');
  if(btn){btn.textContent='⟳ Atualizando...';btn.disabled=true;btn.style.opacity='0.6';}
  await fetchFromN8N();
  renderArea(currentArea);
  if(btn){btn.textContent='⟳ Atualizar';btn.disabled=false;btn.style.opacity='1';}
}

async function init(){
  await fetchFromN8N();
  buildNav();renderArea(currentArea);startCountdown();
  // Verificar a cada 1 hora se está na janela seg-sex 7-18h
  setInterval(async()=>{
    if(shouldSync()){
      await fetchFromN8N();
      renderArea(currentArea);
    }
  }, SYNC_SEC*1000);
}

setInterval(updateClock,1000);updateClock();init();
</script>
