<style>
:root {
  --cream:#FAF8F4; --warm-white:#F5F2EC; --stone:#E8E2D8;
  --taupe:#C4B9A8; --warm-gray:#8C8378;
  --dark:#2C2825; --charcoal:#4A4540;
  --gold:#C9A96E; --geo:#7A2E22;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;background:var(--dark);font-family:'DM Sans',sans-serif;overflow:hidden;display:flex;flex-direction:column;}

/* HEADER */
.tv-header{background:var(--dark);padding:14px 48px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);}
.header-left{display:flex;align-items:center;gap:24px;}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:24px;color:var(--cream);line-height:1;}
.logo em{font-style:italic;color:var(--gold);}
.logo small{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--taupe);margin-top:3px;font-family:'DM Sans',sans-serif;}
.area-name{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:32px;color:var(--cream);border-left:2px solid var(--gold);padding-left:24px;line-height:1;transition:opacity 0.35s;}
.area-name em{font-style:italic;color:var(--gold);}
.header-right{text-align:right;}
.clock{font-family:'DM Mono',monospace;font-size:26px;color:var(--cream);line-height:1;}
.date-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);margin-top:4px;}
.nav-dots{display:flex;gap:6px;align-items:center;margin-top:8px;justify-content:flex-end;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.4s,transform 0.3s;cursor:pointer;}
.dot.active{background:var(--gold);transform:scale(1.3);}
.demo-badge{background:rgba(212,168,90,0.2);border:1px solid rgba(212,168,90,0.4);color:#D4A85A;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:2px;font-family:'DM Sans',sans-serif;}

/* KPI STRIP */
.kpi-strip{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07);padding:10px 48px;display:flex;gap:0;align-items:center;flex-shrink:0;}
.kpi-item{display:flex;flex-direction:column;align-items:center;min-width:72px;padding:0 16px;}
.kpi-item:first-child{padding-left:0;}
.kpi-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--cream);line-height:1;}
.kpi-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);margin-top:3px;}
.kpi-sep{width:1px;height:36px;background:rgba(255,255,255,0.08);}
.area-nav{display:flex;gap:6px;align-items:center;margin-left:auto;padding-left:24px;}
.nav-btn{padding:5px 14px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid rgba(255,255,255,0.12);background:transparent;border-radius:2px;cursor:pointer;color:rgba(255,255,255,0.4);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.nav-btn.active{background:var(--geo);color:#fff;border-color:var(--geo);}
.nav-btn:hover:not(.active){background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.75);}

/* KANBAN */
.main-area{flex:1;padding:16px 48px 12px;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.kanban-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;flex:1;overflow:hidden;transition:opacity 0.35s;min-height:0;}
.kanban-grid.hidden{opacity:0;}
.col-wrap{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0;}
.col-header{padding:9px 14px;border-radius:2px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.col-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:500;}
.col-count{font-family:'DM Mono',monospace;font-size:13px;padding:1px 8px;border-radius:10px;background:rgba(0,0,0,0.15);}

/* TICKER SCROLL — rolagem suave contínua */
.ticker-outer{flex:1;overflow:hidden;position:relative;min-height:0;}
.ticker-inner{display:flex;flex-direction:column;gap:7px;will-change:transform;}
.ticker-inner.paused{animation-play-state:paused!important;}

/* cartões */
.task-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:2px;padding:10px 13px;border-left:3px solid transparent;flex-shrink:0;}
.task-name{font-size:12.5px;line-height:1.45;color:rgba(255,255,255,0.88);font-weight:400;margin-bottom:6px;}
.task-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.task-list{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:2px;font-weight:500;}
.task-due{font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.4);}
.task-due.overdue{color:#E07070;font-weight:500;}
.task-due.soon{color:#D4A85A;}
.task-resp{font-size:10px;color:rgba(255,255,255,0.35);margin-left:auto;}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.empty-col{color:rgba(255,255,255,0.18);text-align:center;padding:24px 8px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;}

/* FOOTER */
.progress-footer{background:rgba(0,0,0,0.25);padding:7px 48px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.05);}
.footer-left{display:flex;align-items:center;gap:20px;}
.prog-txt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--taupe);}
.sync-txt{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);}
.prog-track{width:180px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 1s linear;}
</style>

  completo:      {label:'Concluído',    bg:'rgba(196,185,168,0.08)',col:'#C4B9A8',border:'#8C8378'},
};

let allTasks = [];

function norm(s){ return (s||'').toLowerCase().trim(); }

function fmtDue(str){
  if(!str) return null;
  const d = new Date(str);
  const diff = Math.floor((d - Date.now()) / 86400000);
  const label = d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  if(diff < 0)  return {str:label, cls:'overdue'};
  if(diff <= 3) return {str:label, cls:'soon'};
  return {str:label, cls:''};
}

function buildCard(task, areaColor) {
  const card = document.createElement('div');
  card.className = 'task-card';
  card.style.borderLeftColor = areaColor;
  const due  = task.due ? fmtDue(task.due) : null;
  const ac   = task.assignees?.length || 0;
  const listShort = (task.list||'').length > 20 ? (task.list||'').slice(0,20)+'…' : (task.list||'');
  card.innerHTML = `
    <div class="task-name">${task.name}</div>
    <div class="task-meta">
      <span class="task-list" style="background:${areaColor}22;color:${areaColor}">${listShort}</span>
      ${task.priority ? `<span class="prio-dot" style="background:${PRIO_COLOR[task.priority]||'#8C8378'}" title="${task.priority}"></span>` : ''}
      ${due ? `<span class="task-due ${due.cls}">${due.str}</span>` : ''}
      ${ac > 0 ? `<span class="task-resp">${ac} resp.</span>` : ''}
    </div>`;
  return card;
}

/* ---- Ticker: rolagem suave contínua ---- */
function setupTicker(outerEl, cards, areaColor) {
  if(!cards.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-col';
    empty.textContent = 'nenhuma tarefa';
    outerEl.appendChild(empty);
    return;
  }

  const inner = document.createElement('div');
  inner.className = 'ticker-inner';

  // popula os cartões
  cards.forEach(t => inner.appendChild(buildCard(t, areaColor)));
  outerEl.appendChild(inner);

  // aguarda render para medir altura real
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const outerH  = outerEl.clientHeight;
      const innerH  = inner.scrollHeight;

      // se tudo cabe, não precisa rolar
      if(innerH <= outerH) return;

      // duplica os cartões para loop contínuo
      cards.forEach(t => inner.appendChild(buildCard(t, areaColor)));

      const totalH = inner.scrollHeight / 2;
      const duration = totalH / TICKER_SPEED; // segundos

      inner.style.animation = `tickerScroll ${duration}s linear infinite`;

      // injeta keyframe dinamicamente uma única vez
      if(!document.getElementById('ticker-kf')) {
        const style = document.createElement('style');
        style.id = 'ticker-kf';
        style.textContent = `@keyframes tickerScroll { 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }`;
        document.head.appendChild(style);
      }

      tickerAnimations.set(outerEl, inner);
    });
  });
}

/* ---- Dados ---- */
async function fetchTasks(){
  if(N8N_WEBHOOK_URL){
    try{
      const r = await fetch(N8N_WEBHOOK_URL);
      const d = await r.json();
      document.getElementById('sync-txt').textContent = 'Sincronizado às ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('demo-badge').style.display = 'none';
      return d;
    } catch(e){
      document.getElementById('sync-txt').textContent = 'Erro N8N — tentando novamente...';
      return allTasks.length ? allTasks : MOCK_DATA;
    }
  }
  return MOCK_DATA;
}

function getAreaTasks(area){
  if(area.key === 'geral'){
    const allListed = AREAS.filter(a=>a.key!=='geral').flatMap(a=>a.lists);
    return allTasks.filter(t => !allListed.includes(t.list));
  }
  return allTasks.filter(t => area.lists.includes(t.list));
}

function renderKPIs(tasks){
  document.getElementById('k-total').textContent = tasks.length;
  document.getElementById('k-open').textContent  = tasks.filter(t=>norm(t.status)==='aberto').length;
  document.getElementById('k-prog').textContent  = tasks.filter(t=>norm(t.status)==='em andamento').length;
  document.getElementById('k-pend').textContent  = tasks.filter(t=>norm(t.status)==='pendente').length;
  document.getElementById('k-done').textContent  = tasks.filter(t=>norm(t.status)==='completo').length;
  document.getElementById('k-urg').textContent   = tasks.filter(t=>t.priority==='urgent').length;
}

function buildNav(){
  document.getElementById('nav-dots').innerHTML = AREAS.map((_,i)=>

  document.getElementById('area-nav').innerHTML = AREAS.map((a,i)=>

}

function renderArea(idx){
  const area  = AREAS[idx];
  const tasks = getAreaTasks(area);

  const title = document.getElementById('area-title');
  title.style.opacity = '0';
  setTimeout(()=>{
    title.innerHTML = area.label.replace('&','<em style="color:var(--gold)"> & </em>');
    title.style.opacity = '1';
  }, 250);

  renderKPIs(tasks);
  tickerAnimations.clear();

  // agrupar
  const groups = {};
  STATUS_KEYS.forEach(s => groups[s]=[]);
  tasks.forEach(t=>{
    const s = norm(t.status);
    if(groups[s] !== undefined) groups[s].push(t);
    else groups['aberto'].push(t);
  });

  const grid = document.getElementById('kanban-grid');
  grid.classList.add('hidden');

  setTimeout(()=>{
    grid.innerHTML = '';

    STATUS_KEYS.forEach(status=>{
      const cfg = STATUS_CFG[status];
      const col = document.createElement('div');
      col.className = 'col-wrap';

      // header
      const hdr = document.createElement('div');
      hdr.className = 'col-header';
      hdr.style.cssText = `background:${cfg.bg};border-left:3px solid ${cfg.border};`;
      hdr.innerHTML = `<span class="col-title" style="color:${cfg.col}">${cfg.label}</span>
                       <span class="col-count" style="color:${cfg.col}">${groups[status].length}</span>`;
      col.appendChild(hdr);

      // ticker outer
      const outer = document.createElement('div');
      outer.className = 'ticker-outer';
      setupTicker(outer, groups[status], area.color);
      col.appendChild(outer);

      grid.appendChild(col);
    });

    grid.classList.remove('hidden');

    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  }, 300);
}

function startCountdown(){
  clearInterval(cdTimer);
  countdown = ROTATE_SEC;
  const fill = document.getElementById('prog-fill');
  const txt  = document.getElementById('prog-txt');
  fill.style.width = '100%';
  cdTimer = setInterval(()=>{
    countdown--;
    fill.style.width = Math.round(countdown / ROTATE_SEC * 100) + '%';
    txt.textContent  = `Próxima área em ${countdown}s`;
    if(countdown <= 0){
      clearInterval(cdTimer);
      currentArea = (currentArea + 1) % AREAS.length;
      renderArea(currentArea);
      startCountdown();
    }
  },1000);
}

function jumpArea(idx){
  currentArea = idx;
  renderArea(currentArea);
  startCountdown();
}

function updateClock(){
  const n = new Date();
  document.getElementById('clock').textContent    = n.toLocaleTimeString('pt-BR');
  document.getElementById('date-lbl').textContent = n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
}

async function syncData(){
  allTasks = await fetchTasks();
  renderArea(currentArea);
}

async function init(){
  allTasks = await fetchTasks();
  buildNav();
  renderArea(currentArea);
  startCountdown();
  setInterval(syncData, SYNC_SEC * 1000);
}

setInterval(updateClock, 1000);
updateClock();
init();
</script>
</body>
</html>
